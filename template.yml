AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31

Resources:
  SQSQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: demo-blocked-queue

  LambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: demo-lambda-no-sqs-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  LambdaFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: demo-sqs-denied
      Handler: lambda_function.handler
      Runtime: python3.12
      CodeUri: .
      Role: !GetAtt LambdaRole.Arn

  ErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: demo-sqs-denied-errors
      AlarmDescription: Fires when Lambda throws AccessDenied on SQS SendMessage
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref LambdaFunction
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
